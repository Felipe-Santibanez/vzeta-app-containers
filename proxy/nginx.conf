Nginx
events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        location / {
            # Redirige el tráfico al contenedor de la aplicación.
            # "myapp_container" será el nombre que le daremos en la red de Docker.
            proxy_pass http://myapp_container:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
