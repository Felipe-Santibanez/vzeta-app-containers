name: CI Flujo - Build & Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Configurar Docker BuildX
        uses: docker/setup-buildx-action@v3

      - name: Construir y subir imagen App
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/myapp_container:latest

      - name: Construir y subir imagen NGINX Proxy
        uses: docker/build-push-action@v5
        with:
          context: ./proxy
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mynginx_container:latest
